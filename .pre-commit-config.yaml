exclude: '^(.*_pb2(_grpc)?\.pyi?|legacy-docs/.*\.(html|js))$'

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt (go-client)
        entry: bash -c 'cd go-client && diff=$(gofmt -l .) && [ -z "$diff" ] || { echo "$diff"; echo "run gofmt -w on the above files"; exit 1; }'
        language: system
        files: ^go-client/.*\.go$
        pass_filenames: false

      - id: go-vet
        name: go vet (go-client)
        entry: bash -c 'cd go-client && go vet ./...'
        language: system
        files: ^go-client/.*\.go$
        pass_filenames: false

      - id: go-build
        name: go build (go-client)
        entry: bash -c 'cd go-client && go build ./...'
        language: system
        files: ^go-client/.*\.go$
        pass_filenames: false

      - id: go-test
        name: go test (go-client)
        entry: bash -c 'cd go-client && go test ./...'
        language: system
        files: ^go-client/.*\.go$
        pass_filenames: false

